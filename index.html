<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Mafia Professional (VDO.ninja Edition)</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --accent: #d32f2f; --blue: #1976d2; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #video-grid { 
            flex-grow: 1; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            grid-auto-rows: 1fr; gap: 10px; padding: 10px; 
            background: #000; align-content: start; overflow-y: auto;
        }

        .video-slot { 
            background: #1a1a1a; border: 2px solid #333; border-radius: 8px; 
            position: relative; overflow: hidden; aspect-ratio: 16 / 9;
        }

        iframe { width: 100%; height: 100%; border: none; background: #111; }
        
        .player-label { 
            position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.8); 
            padding: 4px 10px; border-radius: 4px; z-index: 5; font-size: 13px;
            border: 1px solid #444; font-weight: bold; pointer-events: none;
        }

        .slot-num {
            position: absolute; top: 0; right: 10px; font-size: 30px; 
            font-weight: 900; color: rgba(255,255,255,0.05); z-index: 2;
        }

        #host-panel { width: 300px; background: var(--panel); border-left: 2px solid #222; padding: 15px; display: none; flex-direction: column; }
        .player-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; padding: 8px; background: #222; border-radius: 5px; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>MAFIA NINJA</h2>
            <input type="text" id="userName" placeholder="Твоє ім'я">
            <input type="password" id="roomPass" placeholder="Пароль">
            <button onclick="startApp()">УВІЙТИ</button>
        </div>
    </div>

    <div id="video-grid"></div>

    <div id="host-panel">
        <h3 style="text-align: center;">ВЕДУЧИЙ</h3>
        <button onclick="assignNumbers()" style="background: var(--blue);">🎲 РОЗДАТИ НОМЕРИ</button>
        <div id="player-list-admin" style="margin-top: 15px;"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAW3NxnoENnqfk8gXruq9_YDm_Rb77APCg",
    authDomain: "mafia-site-6f939.firebaseapp.com",
    databaseURL: "https://mafia-site-6f939-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "mafia-site-6f939",
    storageBucket: "mafia-site-6f939.firebasestorage.app",
    messagingSenderId: "78605254170",
    appId: "1:78605254170:web:b47e5b500ecffe4f2d1ba3",
    measurementId: "G-CL90SPXY5W" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ROOM_NAME = "Mafia_Ninja_2026"; 
        
        let myId = "u" + Math.floor(Math.random() * 1000000);
        let myRole = "";

        async function startApp() {
            const name = document.getElementById('userName').value.trim();
            const pass = document.getElementById('roomPass').value.trim();
            
            if (pass === "admin2026") myRole = "host";
            else if (pass === "misto2026") myRole = "player";
            else return alert("Невірний пароль");

            document.getElementById('login-screen').style.display = 'none';
            if (myRole === "host") document.getElementById('host-panel').style.display = 'flex';

            // Реєструємо себе у Firebase
            if (myRole === "player") {
                db.ref(`rooms/${ROOM_NAME}/users/${myId}`).set({ 
                    name: name, status: "alive", streamId: myId, number: "" 
                });
                db.ref(`rooms/${ROOM_NAME}/users/${myId}`).onDisconnect().remove();
            }

            syncGrid();
        }

        function syncGrid() {
            db.ref(`rooms/${ROOM_NAME}/users`).on('value', (snapshot) => {
                const users = snapshot.val() || {};
                const grid = document.getElementById('video-grid');
                
                if (myRole === "host") updateAdmin(users);

                // Видаляємо тих, хто пішов
                Array.from(grid.children).forEach(child => {
                    const id = child.id.replace('slot-', '');
                    if (!users[id]) child.remove();
                });

                Object.keys(users).forEach(id => {
                    const u = users[id];
                    let slot = document.getElementById(`slot-${id}`);

                    if (!slot) {
                        slot = document.createElement('div');
                        slot.id = `slot-${id}`;
                        slot.className = 'video-slot';
                        grid.appendChild(slot);
                    }

                    slot.style.order = u.number || 99;
                    const label = `${u.number ? '['+u.number+'] ' : ''}${u.status === 'dead' ? '💀 ' : ''}${u.name}`;

                    // Налаштування URL для VDO.ninja
                    // Для себе - push (відправляємо), для інших - view (дивимось)
                    let ninjaUrl = "";
                    if (id === myId) {
                        // Режим передачі: автостарт, без звуку (щоб не чути себе), приховати UI
                        ninjaUrl = `https://vdo.ninja/?push=${u.streamId}&label=${u.name}&autostart&clean&m&pro`;
                    } else {
                        // Режим перегляду: автоплей, приховати UI
                        ninjaUrl = `https://vdo.ninja/?view=${u.streamId}&autoplay&clean&noapi`;
                    }

                    // Оновлюємо iframe тільки якщо його немає (щоб не перезавантажувати відео)
                    if (!slot.querySelector('iframe')) {
                        slot.innerHTML = `
                            <div class="slot-num">${u.number || ''}</div>
                            <div class="player-label">${label}</div>
                            <iframe src="${ninjaUrl}" allow="camera;microphone"></iframe>
                        `;
                    } else {
                        slot.querySelector('.player-label').innerText = label;
                        slot.querySelector('.slot-num').innerText = u.number || '';
                    }
                });
            });
        }

        window.assignNumbers = function() {
            db.ref(`rooms/${ROOM_NAME}/users`).once('value', snapshot => {
                const data = snapshot.val();
                if (!data) return;
                const ids = Object.keys(data);
                let nums = Array.from({length: ids.length}, (_, i) => (i + 1).toString().padStart(2, '0')).sort(() => Math.random() - 0.5);
                ids.forEach((id, i) => db.ref(`rooms/${ROOM_NAME}/users/${id}/number`).set(nums[i]));
            });
        };

        function updateAdmin(users) {
            const list = document.getElementById('player-list-admin');
            list.innerHTML = '';
            Object.keys(users).sort((a,b) => (users[a].number || 99) - (users[b].number || 99)).forEach(id => {
                const u = users[id];
                list.innerHTML += `<div class="player-row">
                    <span style="font-size:12px;">${u.number || '??'}. ${u.name}</span>
                    <button onclick="db.ref('rooms/${ROOM_NAME}/users/${id}/status').set('${u.status === 'dead' ? 'alive' : 'dead'}')" style="padding:4px; font-size:10px; width:60px;">
                        ${u.status === 'dead' ? 'ALIVE' : 'DEAD'}
                    </button>
                </div>`;
            });
        }
    </script>
</body>
</html>
