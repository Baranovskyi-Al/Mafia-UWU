<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МАФІЯ</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%230a0a0a' stroke='%23d32f2f' stroke-width='4'/><path d='M25 65 h50 v5 a5 5 0 0 1 -5 5 h-40 a5 5 0 0 1 -5 -5 z' fill='%23d32f2f'/><path d='M35 65 v-20 c0-10 10-15 15-15 s15 5 15 15 v20' fill='%23d32f2f'/><rect x='35' y='55' width='30' height='5' fill='%23000'/></svg>">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --accent: #d32f2f; --blue: #1976d2; --border: #333; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #video-grid { flex-grow: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); grid-auto-rows: 1fr; gap: 12px; padding: 12px; background: #000; align-content: start; overflow-y: auto; }
        
        .video-slot { background: #111; border: 2px solid var(--border); border-radius: 12px; position: relative; overflow: hidden; aspect-ratio: 16 / 9; order: 99; }
        .video-slot.dead { border-color: var(--accent); }
        .video-slot.dead iframe { opacity: 0.5; filter: grayscale(0.8); }
        
        .killed-overlay { 
            position: absolute; inset: 0; display: none; align-items: center; justify-content: center; 
            z-index: 20; pointer-events: none; color: var(--accent); font-size: 35px; font-weight: 900; 
            text-transform: uppercase; text-shadow: 0 0 20px #000; letter-spacing: 2px; transform: rotate(-10deg);
            text-align: center; padding: 10px;
        }
        .video-slot.dead .killed-overlay { display: flex; }

        iframe { width: 100%; height: 100%; border: none; background: #000; object-fit: cover; }
        
        .player-label { position: absolute; top: 40px; left: 10px; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 6px; z-index: 10; font-size: 13px; border: 1px solid #444; font-weight: bold; pointer-events: none; }
        .slot-num { position: absolute; top: 5px; right: 15px; font-size: 40px; font-weight: 900; color: rgba(255,255,255,0.07); z-index: 5; pointer-events: none; }

        #host-panel { width: 340px; background: var(--panel); border-left: 2px solid #222; padding: 20px; display: none; flex-direction: column; box-sizing: border-box; }
        .player-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; padding: 12px; background: #222; border-radius: 8px; border-left: 4px solid #444; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; width: 340px; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        
        .login-box button, #host-panel button { width: 100%; } 
        #exit-btn { position: fixed; bottom: 20px; right: 30px; z-index: 100; padding: 10px 25px; background: #333; color: #fff; border: none; border-radius: 8px; cursor: pointer; display: none; font-size: 12px; width: auto; }
        
        .num-edit-btn { background: #444; border-radius: 4px; padding: 2px 6px; font-size: 10px; margin-left: 10px; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--accent);">МАФІЯ</h2>
            <input type="text" id="userName" placeholder="Твоє ім'я (Latin only)" autocomplete="username">
            <input type="password" id="roomPass" placeholder="Пароль" autocomplete="current-password">
            <button onclick="startApp()">УВІЙТИ В МІСТО</button>
        </div>
    </div>

    <button id="exit-btn" onclick="exitGame()">ВИЙТИ</button>
    <div id="video-grid"></div>

    <div id="host-panel">
        <h3 style="text-align: center;">ПАНЕЛЬ ВЕДУЧОГО</h3>
        <button style="background: var(--blue); margin-bottom: 20px;" onclick="assignNumbers()">🎲 РОЗДАТИ НОМЕРИ</button>
        <div id="player-list-admin" style="overflow-y: auto; flex-grow: 1;"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAW3NxnoENnqfk8gXruq9_YDm_Rb77APCg",
            authDomain: "mafia-site-6f939.firebaseapp.com",
            databaseURL: "https://mafia-site-6f939-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mafia-site-6f939",
            storageBucket: "mafia-site-6f939.firebasestorage.app",
            messagingSenderId: "78605254170",
            appId: "1:78605254170:web:b47e5b500ecffe4f2d1ba3"
        };

        const ROOM_NAME = "MAFIA";
        const PASSWORDS = { host: "321", player: "123", observer: "333" };

        const deathPhrases = [
            "НЕЗАКОННО ВБИТО БЛ...", "НЕСПРАВЕДЛИВО ЗАВАЛЕНО", "ВАЛЯЄТЬСЯ В КАНАВІ",
            "ГОДУЄ ЧЕРВ’ЯКІВ", "ВІДПОЧИВАЄ ВІЧНО", "ПЛАВАЄ З РИБАМИ",
            "ЗАМОЧЕНО Й ОБПІСЯНО", "ЧИСТО ВИПАДКОВО В'ЄБАЛИ", "ЙШОВ, ЙШОВ І ВПАВ",
            "ВЖАЛЕНО БДЖІЛКОЮ", "ПРОСТО НЕ ПОВЕЗЛО", "БІЛЬШЕ НЕ ГОВОРИТЬ",
            "З’ЇДЕНИЙ ЩУРАМИ", "ВБИТО ЗА ПОГАНЕ КУНІ", "НОСОЧОК БЛЯЯЯ!!!", "ПОВАГИ НАТІ НЕДОСТАТНЬО!", "ЦЕ ГГ...",
            "ВБИЛИ Й НАДРУГАЛИСЬ", "ВБИЛИ ЗА ВЕЛИКИЙ ХУЙ", "СМЕРТЬ ПРИЙШЛА ПІДЧАС UWU", "НЕ ПЕРЕЖИВ ХТИВІСТЬ ЛІРИКИ", "ЦЕ ВСЕ НОУБАДІ!"
        ];

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myId = "", myRole = "";

        async function startApp() {
            const rawName = document.getElementById('userName').value.trim();
            const pass = document.getElementById('roomPass').value.trim();
            if (!rawName || /[а-яА-ЯіІїЇєЄґҐ]/.test(rawName)) return alert("Тільки латиниця!");

            myId = "p_" + rawName.toLowerCase().replace(/\s+/g, '_');
            if (pass === PASSWORDS.host) myRole = "host";
            else if (pass === PASSWORDS.player) myRole = "player";
            else if (pass === PASSWORDS.observer) myRole = "observer";
            else return alert("Невірний пароль");

            document.getElementById('login-screen').style.display = 'none';
            if (myRole === "host") document.getElementById('host-panel').style.display = 'flex';
            if (myRole !== "observer") {
                document.getElementById('exit-btn').style.display = 'block';
                const userRef = db.ref(`rooms/${ROOM_NAME}/users/${myId}`);
                userRef.set({ name: rawName, status: "alive", streamId: myId + "_stream", number: "", role: myRole });
                userRef.onDisconnect().remove();
                userRef.on('value', (snap) => { if (!snap.exists() && myRole !== "host") location.reload(); });
            }
            syncGrid();
        }

        function syncGrid() {
            db.ref(`rooms/${ROOM_NAME}/users`).on('value', (snapshot) => {
                const users = snapshot.val() || {};
                const grid = document.getElementById('video-grid');
                if (myRole === "host") updateAdminPanel(users);
                Array.from(grid.children).forEach(child => {
                    if (!users[child.id.replace('slot-', '')]) child.remove();
                });

                Object.keys(users).forEach(id => {
                    const u = users[id];
                    let slot = document.getElementById(`slot-${id}`);
                    if (!slot) {
                        slot = document.createElement('div');
                        slot.id = `slot-${id}`;
                        slot.className = 'video-slot';
                        slot.innerHTML = `<div class="slot-num"></div><div class="player-label"></div><div class="killed-overlay"></div><iframe allow="camera;microphone;fullscreen;display-capture;autoplay"></iframe>`;
                        grid.appendChild(slot);
                    }
                    slot.style.order = (u.role === 'host') ? 100 : (u.number || 99);
                    
                    const overlay = slot.querySelector('.killed-overlay');
                    if (u.status === 'dead') {
                        slot.classList.add('dead');
                        if (!slot.dataset.currentPhrase) {
                            const phrase = deathPhrases[Math.floor(Math.random() * deathPhrases.length)];
                            slot.dataset.currentPhrase = phrase;
                            overlay.innerText = phrase;
                        }
                    } else {
                        slot.classList.remove('dead');
                        delete slot.dataset.currentPhrase;
                    }

                    slot.querySelector('.player-label').innerText = `${(u.role === 'host') ? '[Ведучий] ' : ''}${u.number ? '[' + u.number + '] ' : ''}${u.status === 'dead' ? '💀 ' : ''}${u.name}`;
                    slot.querySelector('.slot-num').innerText = (u.role === 'host') ? '' : (u.number || '');
                    
                    const ninjaUrl = (id === myId && myRole !== "observer") 
    ? `https://vdo.ninja/?push=${u.streamId}&webcam&label=${u.name}&as=1&autoconnect&facing=front&ad=1&m&pro&cover=1&codec=h264`
    : `https://vdo.ninja/?view=${u.streamId}&autoplay&autostart&noapi&ad=1&clean&cover=1&codec=h264`;
                    
                    const iframe = slot.querySelector('iframe');
                    if (iframe.src !== ninjaUrl) iframe.src = ninjaUrl;
                });
            });
        }

        function updateAdminPanel(users) {
            const list = document.getElementById('player-list-admin');
            list.innerHTML = '';
            Object.keys(users).sort((a,b) => (users[a].number || 99) - (users[b].number || 99)).forEach(id => {
                const u = users[id];
                const row = document.createElement('div');
                row.className = 'player-row';
                const isMeOrHost = (u.role === 'host' || id === myId);
                const manualNumBtn = isMeOrHost ? '' : `<span class="num-edit-btn" onclick="setManualNumber('${id}')">Присвоїти номер</span>`;
                let controls = isMeOrHost ? `<span style="font-size:10px; color:#777;">ВЕДУЧИЙ</span>` : `
                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <button onclick="toggleLife('${id}')" style="width:100%">${u.status === 'dead' ? 'ОЖИВИТИ' : 'ВБИТИ'}</button>
                        <button onclick="kickPlayer('${id}')" style="background:#444; width:60px; font-size:10px;">КІК</button>
                    </div>`;
                const numDisplay = u.number || (u.role === 'host' ? '★' : '??');
                row.innerHTML = `<span><b>${numDisplay}.</b> ${u.name} ${manualNumBtn}</span>${controls}`;
                list.appendChild(row);
            });
        }

        window.setManualNumber = id => {
            const n = prompt("Номер (напр. 01):");
            if (n !== null) db.ref(`rooms/${ROOM_NAME}/users/${id}/number`).set(n.padStart(2, '0').slice(-2));
        };

        window.toggleLife = id => {
            db.ref(`rooms/${ROOM_NAME}/users/${id}/status`).once('value', s => {
                db.ref(`rooms/${ROOM_NAME}/users/${id}/status`).set(s.val() === 'dead' ? 'alive' : 'dead');
            });
        };

        window.kickPlayer = id => confirm("Видалити?") && db.ref(`rooms/${ROOM_NAME}/users/${id}`).remove();

        window.assignNumbers = () => {
            db.ref(`rooms/${ROOM_NAME}/users`).once('value', s => {
                const d = s.val(); if (!d) return;
                const pIds = Object.keys(d).filter(id => d[id].role !== 'host');
                let nums = Array.from({length: pIds.length}, (_, i) => (i + 1).toString().padStart(2, '0')).sort(() => Math.random() - 0.5);
                pIds.forEach((id, i) => db.ref(`rooms/${ROOM_NAME}/users/${id}/number`).set(nums[i]));
            });
        };

        function exitGame() { confirm("Вийти?") && db.ref(`rooms/${ROOM_NAME}/users/${myId}`).remove().then(() => location.reload()); }
    </script>
</body>
</html>
