<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>MAFIA</title>
    
    <!-- SDK Daily.co та Firebase -->
    <script src="https://unpkg.com/@daily-co/daily-js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --accent: #d32f2f; --blue: #1976d2; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Адаптивна сітка */
        #video-grid { 
            flex-grow: 1; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            grid-auto-rows: 1fr; gap: 15px; padding: 15px; 
            background: #000; align-content: start; overflow-y: auto;
        }

        .video-slot { 
            background: #1a1a1a; border: 2px solid #333; border-radius: 12px; 
            position: relative; overflow: hidden; aspect-ratio: 16 / 9;
        }

        video { width: 100%; height: 100%; object-fit: cover; background: #111; }
        
        .player-label { 
            position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.8); 
            padding: 6px 12px; border-radius: 6px; z-index: 5; font-size: 14px;
            border: 1px solid #444; font-weight: bold;
        }

        .slot-number-bg {
            position: absolute; top: 5px; right: 15px; font-size: 35px; 
            font-weight: 900; color: rgba(255,255,255,0.05); z-index: 2;
        }

        #host-panel { width: 320px; background: var(--panel); border-left: 2px solid #222; padding: 20px; display: none; flex-direction: column; box-sizing: border-box; }
        .player-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 12px; background: #222; border-radius: 8px; border-left: 4px solid #444; }
        .player-row.dead { border-left-color: var(--accent); opacity: 0.6; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--panel); padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>MAFIA</h2>
            <input type="text" id="userName" placeholder="Твоє ім'я">
            <input type="password" id="roomPass" placeholder="Пароль">
            <button onclick="startApp()">УВІЙТИ</button>
        </div>
    </div>

    <div id="video-grid"></div>

    <div id="host-panel">
        <h3 style="text-align: center; margin-top: 0;">ПАНЕЛЬ ВЕДУЧОГО</h3>
        <button onclick="assignNumbers()" style="background: var(--blue); margin-bottom: 20px;">🎲 РОЗДАТИ НОМЕРИ</button>
        <div id="player-list-admin"></div>
    </div>

    <script>
        // --- КОНФІГУРАЦІЯ ---
        const DAILY_ROOM_URL = "https://cattusdeus.daily.co/kwBR3sUZu4JBbNcq5gNa"; 
        const firebaseConfig = { 
            apiKey: "AIzaSyAW3NxnoENnqfk8gXruq9_YDm_Rb77APCg",
            authDomain: "mafia-site-6f939.firebaseapp.com",
            databaseURL: "https://mafia-site-6f939-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mafia-site-6f939",
            storageBucket: "mafia-site-6f939.firebasestorage.app",
            messagingSenderId: "78605254170",
            appId: "1:78605254170:web:b47e5b500ecffe4f2d1ba3",
            measurementId: "G-CL90SPXY5W" 
    };

        const PASSWORDS = { host: "admin2026", player: "misto2026" };
        const ROOM_ID = "Mafia_Daily_Session";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let callFrame = null;
        let myId = null;
        let myRole = "";

        async function startApp() {
            const name = document.getElementById('userName').value.trim();
            const pass = document.getElementById('roomPass').value.trim();
            
            if (pass === PASSWORDS.host) myRole = "host";
            else if (pass === PASSWORDS.player) myRole = "player";
            else return alert("Невірний пароль");

            document.getElementById('login-screen').style.display = 'none';
            if (myRole === "host") document.getElementById('host-panel').style.display = 'flex';

            // Ініціалізація Daily без IFrame (чистий Call Object)
            callFrame = window.DailyIframe.createCallObject();
            
            await callFrame.join({ url: DAILY_ROOM_URL, userName: name });
            myId = callFrame.participants().local.session_id;

            if (myRole === "player") {
                db.ref(`rooms/${ROOM_ID}/users/${myId}`).set({ 
                    name: name, status: "alive", dailyId: myId, number: "" 
                });
                db.ref(`rooms/${ROOM_ID}/users/${myId}`).onDisconnect().remove();
            }

            // Слухаємо оновлення учасників
            callFrame.on('participant-updated', handleParticipantUpdate);
            callFrame.on('participant-joined', handleParticipantUpdate);
            callFrame.on('participant-left', (e) => document.getElementById(`slot-${e.participant.session_id}`)?.remove());

            syncWithFirebase();
        }

        function handleParticipantUpdate() {
            // Ця функція просто тригерить перемальовку, якщо треба
            // Основна магія в syncWithFirebase
        }

        function syncWithFirebase() {
            db.ref(`rooms/${ROOM_ID}/users`).on('value', (snapshot) => {
                const users = snapshot.val();
                if (!users) return;

                const grid = document.getElementById('video-grid');
                const participants = callFrame.participants();

                if (myRole === "host") updateAdminPanel(users);

                Object.keys(users).forEach(id => {
                    const userData = users[id];
                    let slot = document.getElementById(`slot-${id}`);

                    if (!slot) {
                        slot = document.createElement('div');
                        slot.id = `slot-${id}`;
                        slot.className = 'video-slot';
                        grid.appendChild(slot);
                    }

                    // Сортування через CSS Order
                    slot.style.order = userData.number || 99;

                    const label = `${userData.number ? '['+userData.number+'] ' : ''}${userData.status === 'dead' ? '💀 ВБИТО: ' : ''}${userData.name}`;
                    slot.innerHTML = `
                        <div class="slot-number-bg">${userData.number || ''}</div>
                        <div class="player-label">${label}</div>
                        <video id="video-${id}" autoplay playsinline muted="${id === myId}"></video>
                    `;

                    // Підключаємо потік до відео-тегу
                    const p = id === myId ? participants.local : participants[id];
                    if (p && p.videoTrack) {
                        const vTag = document.getElementById(`video-${id}`);
                        vTag.srcObject = new MediaStream([p.videoTrack]);
                    }
                });
            });
        }

        window.assignNumbers = function() {
            db.ref(`rooms/${ROOM_ID}/users`).once('value', snapshot => {
                const data = snapshot.val();
                const ids = Object.keys(data);
                let nums = Array.from({length: ids.length}, (_, i) => (i + 1).toString().padStart(2, '0')).sort(() => Math.random() - 0.5);
                ids.forEach((id, i) => db.ref(`rooms/${ROOM_ID}/users/${id}/number`).set(nums[i]));
            });
        };

        function updateAdminPanel(users) {
            const list = document.getElementById('player-list-admin');
            list.innerHTML = '';
            Object.keys(users).sort((a,b) => (users[a].number || 99) - (users[b].number || 99)).forEach(id => {
                const u = users[id];
                list.innerHTML += `<div class="player-row ${u.status === 'dead' ? 'dead' : ''}">
                    <span><b>${u.number || '??'}.</b> ${u.name}</span>
                    <button onclick="db.ref('rooms/${ROOM_ID}/users/${id}/status').set('${u.status === 'dead' ? 'alive' : 'dead'}')">
                        ${u.status === 'dead' ? 'ОЖИТИ' : 'ВБИТИ'}
                    </button>
                </div>`;
            });
        }
    </script>
</body>
</html>
